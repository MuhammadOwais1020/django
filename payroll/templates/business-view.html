<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- javaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

    <title>Business View</title>

    <style>
        body {
            width: 0;
            height: 0;
        }

        .header {
            height: 7vh;
            text-align: center;
            justify-content: center;
            color: white;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-sm-12 bg-info header">
                <h2>Payroll App</h2>
            </div>
        </div>
        <div class="container">
            {% for b in business_record %}
            <h3>Business Details</h3>
            <div class="row">
                <div class="col-sm-12">
                    <div class="form-group">
                        <label for="business-name">Business Name *</label>
                        <input type="text" class="form-control" id="business-name" name="business-name"
                            value="{{b.business_name}}" required />
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-4">
                    <div class="form-group">
                        <label for="street1">Street 1 *</label>
                        <input type="text" class="form-control" name="street1" id="street1" value="{{b.street_1}}"
                            required />
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="form-group">
                        <label for="street2">Street 2</label>
                        <input type="text" class="form-control" name="street2" id="street2" value="{{b.street2}}" />
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="form-group">
                        <label for="city-town">City Town *</label>
                        <input type="text" class="form-control" name="city-town" id="city-town" value="{{b.city}}"
                            required />
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-4">
                    <div class="form-group">
                        <label for="postal-code">Postal Code *</label>
                        <input type="text" class="form-control" name="postal-code" id="postal-code"
                            value="{{b.postal_code}}" required />
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="form-group">
                        <label for="parish">Parish *</label>
                        <input type="text" class="form-control" name="parish" id="parish" value="{{b.parish}}"
                            required />
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="form-group">
                        <label for="country">Country *</label>
                        <input type="text" class="form-control" name="country" id="country" value="Jamaica"
                            value="{{b.country}}" required />
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-4">
                    <div class="form-group">
                        <label for="TRN">Tax Registration Number *</label>
                        <input type="numeric" name="TRN" class="form-control" id="TRN"
                            value="{{b.tax_registration_number}}" required />
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="form-group">
                        <label for="NIS">National Insurance Scheme *</label>
                        <input type="numeric" name="NIS" class="form-control" id="NIS"
                            value="{{b.national_insurnce_scheme}}" required />
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="form-group">
                        <label for="business-start-date">Business Start Date *</label>
                        <input type="date" name="business-start-date" class="form-control" id="business-start-date"
                            value="{{b.business_start_date}}" required />
                    </div>
                </div>
            </div>
            {% endfor %}

        </div>
    </div>
</body>

</html>
