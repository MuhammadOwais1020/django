<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- javaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <title>Employee Creation</title>
</head>

<body>
    <div class="container">
        <h1>Add Employee</h1>
        <hr>
        <h3>Step 1 - Bsic Information</h3>
        <div class="row">
            <div class="col-sm-4">
                <div class="form-group">
                    <label for="first-name">First Name</label>
                    <input type="text" class="form-control" name="first-name" id="first-name">
                </div>
            </div>
            <div class="col-sm-4">
                <div class="form-group">
                    <label for="last-name">Last Name</label>
                    <input type="text" class="form-control" name="last-name" id="last-name">
                </div>
            </div>
            <div class="col-sm-4">
                <div class="form-group">
                    <label for="job-title">Job Title</label>
                    <input type="text" class="form-control" name="job-title" id="job-title">
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-sm-4">
                <div class="form-group">
                    <label for="department">Department</label>
                    <input type="text" class="form-control" name="department" id="department">
                </div>
            </div>
            <div class="col-sm-4">
                <div class="form-group">
                    <label for="start-date">Start Date</label>
                    <input type="date" class="form-control" name="start-date" id="start-date">
                </div>
            </div>
            <div class="col-sm-4">
                <div class="form-group">
                    <label for="work-address">Work Address</label>
                    <input type="text" class="form-control" name="work-address" id="work-address">
                </div>
            </div>
        </div>
        <br>
        <hr>
        <h3>Step 2 - Personal Information</h3>
        <div class="row">
            <div class="col-sm-4">
                <div class="form-group">
                    <label for="date-of-birth">Date of Birth</label>
                    <input type="date" name="date-of-birth" id="date-of-birth" class="form-control">
                </div>
            </div>
            <div class="col-sm-4">
                <div class="form-group">
                    <label for="trn">TRN</label>
                    <input type="numeric" name="trn" id="trn" class="form-control">
                </div>
            </div>
            <div class="col-sm-4">
                <div class="form-group">
                    <label for="nis">NIS</label>
                    <input type="numeric" name="nis" id="nis" class="form-control">
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-sm-4">
                <div class="form-group">
                    <label for="contact-number">Contact Number</label>
                    <input type="numeric" name="contact-number" id="contact-number" class="form-control">
                </div>
            </div>
            <div class="col-sm-4">
                <div class="form-group">
                    <label for="personal-email">Personal Email Address</label>
                    <input type="email" name="personal-email" id="personal-email" class="form-control">
                </div>
            </div>
            <div class="col-sm-4">
                <div class="form-group">
                    <label for="next-of-kin(full-name)">Next of Kin (Full Name)</label>
                    <input type="text" name="next-of-kin(full-name)" id="next-of-kin(full-name)" class="form-control">
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-sm-4">
                <div class="form-group">
                    <label for="contact-number-of-kin">Contact Number of Next of Kin</label>
                    <input type="numeric" name="contact-number-of-kin" id="contact-number-of-kin" class="form-control">
                </div>
            </div>
            <div class="col-sm-4">
                <div class="form-group">
                    <label for="address-line-1">Address Line 1</label>
                    <input type="text" name="address-line-1" id="address-line-1" class="form-control">
                </div>
            </div>
            <div class="col-sm-4">
                <div class="form-group">
                    <label for="address-line-2">Address Line 2</label>
                    <input type="text" name="address-line-2" id="address-line-2" class="form-control">
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-sm-4">
                <div class="form-group">
                    <label for="city-town">City/Town</label>
                    <input type="text" name="city-town" id="city-town" class="form-control">
                </div>
            </div>
            <div class="col-sm-4">
                <div class="form-group">
                    <label for="postal-code">Postal code</label>
                    <input type="numeric" name="postal-code" id="postal-code" class="form-control">
                </div>
            </div>
            <div class="col-sm-4">
                <div class="form-group">
                    <label for="parish">Parish</label>
                    <input type="text" name="parish" id="parish" class="form-control">
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-sm-4">
                <div class="form-group">
                    <label for="country">Country</label>
                    <input type="text" name="country" id="country" class="form-control" value="Jamaica">
                </div>
            </div>
        </div>
        <br>
        <hr>
        <h3>Step 3 - Earnings</h3>
        <div class="row">
            <div class="col-sm-4">
                <div class="form-group">
                    <label for="pay-period">Pay Period</label>
                    <select name="pay-period" id="pay-period" class="form-control">
                        <option value="Monthly">Monthly (12)</option>
                        <option value="Fortnightly">Fortnightly (26)</option>
                        <option value="Bi-Weekly">Bi-Weekly (24)</option>
                        <option value="Weekly">Weekly (52)</option>
                        <option value="Hourly">Hourly</option>
                    </select>
                </div>
            </div>
            <div class="col-sm-4">
                <div class="form-group">
                    <label for="basic-pay">Basic Pay</label>
                    <input type="numeric" class="form-control" id="basic-pay" name="basic-pay">
                </div>
            </div>
            <div class="col-sm-4">
                <div class="form-group">
                    <label for="add-earning-type">Add Other Earning Type</label>

                </div>
            </div>
        </div>
    </div>
</body>

</html>
