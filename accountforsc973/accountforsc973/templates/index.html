<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- javaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <title>Document</title>
    <style>
        #content-box {
            width: 100%;
            height: 150px;
        }
    </style>
</head>

<body>
    <!-- NAV bar -->
    <section>
        <nav class="navbar navbar-dark" style="background-color: #0a4275;">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Title of Web Page</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#collapsibleNavbar">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="collapsibleNavbar">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="#">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">About</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Contact Us</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Socials</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Terms of Use</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </section>

    <!-- content bpxes -->
    <section>
        <div class="container">
            <h1>Data Scrap from</h1>
            <div class="row">
                {% for l, h in list_group %}
                <div class="col-sm-3 mb-4">
                    <a class="p-0 btn" href="https://www.bbc.com{{l}}">
                        <div class="p-3 border rounded" id="content-box">
                            <h3>Content Box 1</h3>
                            <p>{{h}}</p>
                        </div>
                    </a>
                </div>
                {% endfor %}
            </div>
            <br>
        </div>
    </section>
    <br>
    <!-- footer -->
    <section class="">
        <!-- Footer -->
        <footer class="text-center text-white" style="background-color: #0a4275;">
            <!-- Grid container -->
            <div class="container p-4 pb-0">
                <!-- Section: CTA -->
                <section class="">
                    <p class="d-flex justify-content-center align-items-center">
                        <span class="me-3"><a href="" class="btn" style="color: white;">Home</a> | <a href=""
                                class="btn" style="color: white;">About</a>
                            | <a href="" class="btn" style="color: white;">Contact Us</a> | <a href="" class="btn"
                                style="color: white;">Socials</a> | <a href="Terms of Use" class="btn"
                                style="color: white;">Terms of Use</a></span>
                    </p>
                </section>
                <!-- Section: CTA -->
            </div>
            <!-- Grid container -->

            <!-- Copyright -->
            <div class="text-center p-3" style="background-color: rgba(0, 0, 0, 0.2);">
                © 2022 Copyright:
                <a class="text-white" href="">accountforsc973</a>
            </div>
            <!-- Copyright -->
        </footer>
        <!-- Footer -->
    </section>

</body>

</html>
